
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Week Scheme</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f0f0f0;
}

.container{
    max-width:1100px;
    margin:20px auto;
    background:#fff;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* Heading */
.title{
    text-align:center;
    color:red;
    font-size:28px;
    font-weight:bold;
    text-decoration:underline;
}

.subtitle{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-top:5px;
}

/* Table */
.table-box{
    margin-top:20px;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    text-align:center;
}

th{
    background:#4f79a7;
    color:white;
    padding:12px;
    font-size:16px;
}

td{
    padding:20px;
    font-size:24px;
    font-weight:bold;
    background:#dfe3ea;
}

td:first-child{
    background:#5c83b1;
    color:white;
    font-size:28px;
}

/* Section title */
.section-title{
    text-align:center;
    margin:30px 0 20px;
    font-size:22px;
    font-weight:bold;
    text-decoration:underline;
}

/* Image Grid */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:15px;
}

.grid img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:8px;
}

/* Responsive */
@media(max-width:768px){
    .title{
        font-size:22px;
    }
    td{
        font-size:18px;
        padding:15px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="title">VALENTINE WEEK SCHEME</div>
    <div class="subtitle">7 FEB - 14 FEB</div>

    <div class="table-box">
        <table>
            <tr>
                <th>TOTAL TARGET</th>
                <th>ACHIEVE</th>
                <th>PERCENTAGE</th>
            </tr>
            <tr>
                <td>300</td>
                <td>243</td>
                <td>81%</td>
            </tr>
        </table>
    </div>

    <div class="section-title">DIL JEETNE WALEE EXPERIENCES</div>

    <div class="grid">
        <img src="https://via.placeholder.com/400x300">
        <img src="https://via.placeholder.com/400x300">
        <img src="https://via.placeholder.com/400x300">
        <img src="https://via.placeholder.com/400x300">
    </div>

</div>

</body>
</html>
